services:
  investpilot:
    build: .
    container_name: investpilot
    restart: unless-stopped
    expose:
      - '8000'
    ports:
      - '127.0.0.1:8000:8000'  # Lokaler SSH-Tunnel-Zugang bis DNS-Wechsel
    volumes:
      - /opt/investpilot/data:/app/data
      - /opt/investpilot/Bericht:/app/Bericht
      # v37df (07.05.2026): Backup-Verzeichnis read-only mounten damit
      # Cutover-Readiness-Card Hard-Gate #4 last_backup.json lesen kann.
      # Vorher: Container sah weder /backups noch /var/backups/investpilot
      # -> Card hardcoded yellow trotz erfolgreichem 04:00 UTC Backup-Cron.
      - /var/backups/investpilot:/backups:ro
    env_file:
      - /opt/investpilot/.env
    environment:
      - TZ=Europe/Zurich
      - PYTHONPATH=/app
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 60s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /opt/investpilot/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /opt/investpilot/logs/caddy:/var/log/caddy
    environment:
      - TZ=Europe/Zurich
    depends_on:
      - investpilot

volumes:
  caddy_data:
  caddy_config:
