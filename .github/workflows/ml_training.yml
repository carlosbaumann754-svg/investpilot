name: ML Training

# Laeuft auf:
#   - manuellem Trigger (Dashboard / GitHub UI via workflow_dispatch)
#   - wochentlichem Cron: Samstag 04:00 UTC (06:00 CEST), damit das
#     ML-Modell ohne manuelles Eingreifen frisch bleibt. Samstag gewaehlt
#     weil Maerkte geschlossen sind und der Gist-Backup am Sonntag frueh
#     (Optimizer 03:00 UTC) bereits die neuen Gewichte sieht.
#
# Grund fuer GH-Action-Offload: Render Free Tier (512 MB RAM) kann
# download_history(years=5) fuer 70+ Symbole + GradientBoosting-Training
# nicht ausfuehren ohne den Web-Container zu OOMen (-> 502 Bad Gateway).
# Ein GitHub Actions Runner hat 7 GB RAM, laeuft isoliert und pusht das
# Ergebnis (inkl. joblib base64-encoded) ueber den bestehenden Backup-Gist
# zurueck an Render. Der Scheduler-Watchdog check_and_reload_ml_training_output()
# laedt die frischen Gewichte alle 300s und forciert ml_scorer._model=None.

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Trigger-Quelle (dashboard / manual / debug)"
        required: false
        default: "manual"
  schedule:
    # Samstag 04:00 UTC = 06:00 CEST — Markets zu, vor Optimizer (So 03:00 UTC)
    - cron: '0 4 * * 6'

# Nur ein aktiver Lauf gleichzeitig — neuere Trigger queueen.
concurrency:
  group: investpilot-ml-training
  cancel-in-progress: false

jobs:
  train:
    name: "Run ML Training"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data/logs
          if [ ! -f data/config.json ]; then
            echo "{}" > data/config.json
          fi

      - name: Run ML training
        env:
          GITHUB_TOKEN: ${{ secrets.INVESTPILOT_GIST_TOKEN }}
          INVESTPILOT_ML_CI: '1'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.ml_training_runner github-action-${{ github.event.inputs.triggered_by || (github.event_name == 'schedule' && 'weekly-cron') || 'manual' }}

      - name: Upload ML training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-training-result-${{ github.run_id }}
          path: |
            data/ml_model.json
            data/ml_model.joblib
            data/ml_training_status.json
            data/logs/
          retention-days: 14
          if-no-files-found: warn
