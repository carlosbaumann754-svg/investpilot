name: Manual Backtest

# Laeuft nur auf manuellen Trigger (aus dem InvestPilot-Dashboard via
# workflow_dispatch oder aus dem GitHub UI). Kein Cron — das machen wir
# im Weekly Optimizer (der hat bereits Backtest integriert).
#
# Grund: Render Free Tier (512 MB RAM) kann einen Full-Backtest nicht
# ausfuehren ohne den Web-Container zu OOMen (-> 502 Bad Gateway).
# Ein GitHub Actions Runner hat 7 GB RAM, laeuft isoliert und pusht das
# Ergebnis ueber den bestehenden Backup-Gist zurueck an Render.

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Trigger-Quelle (dashboard / manual / debug)"
        required: false
        default: "manual"

# Nur ein aktiver Lauf gleichzeitig — neuere Trigger queueen.
concurrency:
  group: investpilot-backtest
  cancel-in-progress: false

jobs:
  backtest:
    name: "Run Full Backtest"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data/logs
          if [ ! -f data/config.json ]; then
            echo "{}" > data/config.json
          fi

      - name: Run backtest
        env:
          GITHUB_TOKEN: ${{ secrets.INVESTPILOT_GIST_TOKEN }}
          INVESTPILOT_BACKTEST_CI: '1'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.backtest_runner github-action-${{ github.event.inputs.triggered_by || 'manual' }}

      - name: Upload backtest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-result-${{ github.run_id }}
          path: |
            data/backtest_results.json
            data/backtest_status.json
            data/universe_health.json
            data/logs/
          retention-days: 14
          if-no-files-found: warn
