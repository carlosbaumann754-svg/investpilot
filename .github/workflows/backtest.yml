name: Backtest

# Laeuft auf:
#   - manuellem Trigger (Dashboard / GitHub UI via workflow_dispatch)
#   - woechentlichem Cron: Sonntag 06:00 UTC (08:00 CEST), damit nach
#     dem Optimizer-Lauf (So 03:00 UTC) automatisch validiert wird ob
#     die neuen Parameter historisch besser performen.
#
# Grund fuer GH-Action-Offload: Render Free Tier (512 MB RAM) kann
# einen Full-Backtest nicht ausfuehren ohne den Web-Container zu OOMen
# (-> 502 Bad Gateway). Ein GitHub Actions Runner hat 7 GB RAM, laeuft
# isoliert und pusht das Ergebnis ueber den bestehenden Backup-Gist
# zurueck an Render.

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Trigger-Quelle (dashboard / manual / debug / sensitivity)"
        required: false
        default: "manual"
      overrides:
        description: "Sensitivity-Overrides space-separated (z.B. 'demo_trading.min_scanner_score=35 demo_trading.max_single_trade_pct_of_portfolio=0.12')"
        required: false
        default: ""
  schedule:
    # Sonntag 06:00 UTC = 08:00 CEST — 3h nach Optimizer (So 03:00 UTC)
    - cron: '0 6 * * 0'

# Nur ein aktiver Lauf gleichzeitig — neuere Trigger queueen.
concurrency:
  group: investpilot-backtest
  cancel-in-progress: false

jobs:
  backtest:
    name: "Run Full Backtest"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data/logs
          if [ ! -f data/config.json ]; then
            echo "{}" > data/config.json
          fi

      - name: Run backtest
        env:
          GITHUB_TOKEN: ${{ secrets.INVESTPILOT_GIST_TOKEN }}
          INVESTPILOT_BACKTEST_CI: '1'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BT_OVERRIDES: ${{ github.event.inputs.overrides }}
        run: |
          TB="github-action-${{ github.event.inputs.triggered_by || (github.event_name == 'schedule' && 'weekly-cron') || 'manual' }}"
          if [ -n "$BT_OVERRIDES" ]; then
            echo "Running with overrides: $BT_OVERRIDES"
            python -m app.backtest_runner "$TB" --override $BT_OVERRIDES
          else
            python -m app.backtest_runner "$TB"
          fi

      - name: Upload backtest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-result-${{ github.run_id }}
          path: |
            data/backtest_results.json
            data/backtest_status.json
            data/universe_health.json
            data/logs/
          retention-days: 14
          if-no-files-found: warn
