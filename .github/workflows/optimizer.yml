name: Weekly Optimizer

# Laeuft jeden Sonntag 03:00 UTC (= 04:00/05:00 MEZ/MESZ).
# Zusaetzlich manuell triggerbar via "Run workflow" im GitHub UI
# oder via REST API (workflow_dispatch) — z.B. vom Render Dashboard-Button.
#
# v10 PERFORMANCE PACK (Hebel 1+2+3):
#   1) precompute_grid_data + simulate_trades_fast (Score-Cache)
#   2) GH Actions Matrix-Sharding (4 parallele Worker)
#   3) ProcessPoolExecutor pro Worker (2 vCPU)
# Gesamt-Speedup ggu. v10.0 sequenziell: ~30-50x. Ein 216-Combo Grid soll
# damit deutlich unter 45 Min bleiben — Headroom fuer groessere Grids.
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Trigger-Quelle (manual / dashboard / debug)"
        required: false
        default: "manual"

# Erlaubt nur einen aktiven Lauf gleichzeitig — neuere Trigger queueen,
# altere Laeufe werden gecancelt.
concurrency:
  group: investpilot-optimizer
  cancel-in-progress: false

jobs:
  # ==========================================================
  # SHARD JOBS — laufen parallel, jeweils ~1/4 des Grids
  # Kein Gist-Push, Resultate gehen als Artifact an Merge-Job
  # ==========================================================
  optimize:
    name: "Optimizer Shard ${{ matrix.shard }}/${{ strategy.job-total }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data/logs
          if [ -f data/config.json ]; then
            echo "Default config.json bereits vorhanden"
          else
            echo "{}" > data/config.json
          fi

      - name: Run optimizer shard
        env:
          GITHUB_TOKEN: ${{ secrets.INVESTPILOT_GIST_TOKEN }}
          INVESTPILOT_OPTIMIZER_CI: '1'
          INVESTPILOT_OPTIMIZER_SHARD_MODE: '1'
          INVESTPILOT_OPTIMIZER_SHARD: ${{ matrix.shard }}
          INVESTPILOT_OPTIMIZER_NUM_SHARDS: '4'
          # Optional: Worker-Anzahl pro Shard (default = cpu_count = 2 auf GH free)
          INVESTPILOT_OPTIMIZER_WORKERS: '2'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.optimizer_runner github-action-shard-${{ matrix.shard }}-${{ github.event.inputs.triggered_by || 'cron' }}

      - name: Upload shard result (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-shard-${{ matrix.shard }}
          path: |
            data/optimizer_shard_${{ matrix.shard }}.json
            data/optimizer_status.json
            data/logs/
          retention-days: 14
          if-no-files-found: warn

  # ==========================================================
  # MERGE JOB — sammelt alle Shards, picked global best,
  # macht ML-Compare, schreibt Config und pusht in den Gist.
  # ==========================================================
  merge:
    name: Merge & Apply Optimization
    needs: optimize
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data/logs
          if [ -f data/config.json ]; then
            echo "Default config.json bereits vorhanden"
          else
            echo "{}" > data/config.json
          fi

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: optimizer-shard-*

      - name: Move shard JSONs into data/
        run: |
          shopt -s nullglob
          for f in artifacts/optimizer-shard-*/optimizer_shard_*.json; do
            echo "Moving $f -> data/"
            cp "$f" data/
          done
          ls -la data/optimizer_shard_*.json || echo "Keine Shard-Files gefunden"

      - name: Run optimizer merge
        env:
          GITHUB_TOKEN: ${{ secrets.INVESTPILOT_GIST_TOKEN }}
          INVESTPILOT_OPTIMIZER_CI: '1'
          INVESTPILOT_OPTIMIZER_MERGE_MODE: '1'
          INVESTPILOT_OPTIMIZER_WORKERS: '2'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.optimizer_runner github-action-merge-${{ github.event.inputs.triggered_by || 'cron' }}

      - name: Upload merge result (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-merge-${{ github.run_id }}
          path: |
            data/optimizer_status.json
            data/optimization_history.json
            data/logs/
          retention-days: 14
          if-no-files-found: ignore
