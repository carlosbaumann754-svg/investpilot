services:
  - type: web
    name: investpilot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TZ
        value: Europe/Zurich
      # INVESTPILOT_DATA_DIR bewusst NICHT gesetzt — sonst ueberschreibt es
      # die Auto-Detection in app/config_manager.py:25-26 und der Bot schreibt
      # nach /app/data (Container-FS, weg bei Restart) statt /data
      # (10 GB Persistent Disk, Starter-Plan, taegl. Snapshot 02:00 UTC).
      - key: PYTHONPATH
        value: /app
      - key: ETORO_PUBLIC_KEY
        sync: false
      - key: ETORO_DEMO_PRIVATE_KEY
        sync: false
      - key: ETORO_ENVIRONMENT
        value: demo
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
