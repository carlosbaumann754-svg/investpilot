version: "3.8"

services:
  investpilot:
    build: .
    container_name: investpilot
    restart: unless-stopped
    ports:
      - "8443:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Europe/Zurich
      - INVESTPILOT_DATA_DIR=/app/data
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
